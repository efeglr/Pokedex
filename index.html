<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <nav class="bg-lime-200">
        <ul class="flex justify-center gap-12 pt-5 pb-5">
            <li class="styling-none"><a href="index.html">Home</a></li>
            <li class="styling-none"><a href="pokedex.html">Pokedex</a></li>
        </ul>
    </nav>
    <main class="flex flex-col justify-start items-center bg-gray-200 min-h-190">
        <h1 class="text-2xl p-2 mt-4 mb-4 font-bold">Your Pokedex Database!</h1>
        <div class="flex gap-x-2" id="random-pokemon-display"></div>
        <p class="mt-4 mb-4" ><strong>A quick How to:</strong>
           <br>1. Input the Name OR the ID of the Pokemon
           <br>2. Click on search! 
        </p>
        <div>
            <input id="input" class="bg-lime-200 border-2" id="fname" type="text" placeholder="Pikachu">
            <button id="search" type="button" class="border-2 rounded-full pr-2 pl-2 cursor-pointer">Search</button>
        </div>
        <div id="pokemon-display"></div>
    </main>
    <script src="main.js"></script>
</body>
</html>
